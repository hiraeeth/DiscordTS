name: Stale

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 45
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security
          exempt-pr-labels: pinned,security
          stale-issue-message: "This issue has been inactive for a while and will be closed if there is no further activity. Comment to keep it open."
          stale-pr-message: "This pull request has been inactive for a while and will be closed if there is no further activity. Comment or push to keep it open."
